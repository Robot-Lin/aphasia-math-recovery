<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算术康复练习</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        'primary-hover': '#2563EB',
                        success: '#10B981',
                        'success-light': '#D1FAE5',
                        error: '#EF4444',
                        'error-light': '#FEE2E2',
                        warning: '#F59E0B',
                    },
                    fontSize: {
                        'display': ['4rem', { lineHeight: '1.2' }],
                        'display-sm': ['3rem', { lineHeight: '1.2' }],
                        'question': ['3.5rem', { lineHeight: '1.3' }],
                    },
                    spacing: {
                        '18': '4.5rem',
                        '22': '5.5rem',
                    }
                }
            }
        }
    </script>
    <style>
        /* 自定义样式 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .btn-press:active {
            transform: scale(0.95);
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 大字体优化 */
        .large-text {
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
        }

        /* 移动端侧边栏样式 */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.08);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            transition: all 200ms ease;
        }
        .mobile-menu-btn:active {
            transform: scale(0.95);
        }

        /* 遮罩层 */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 15;
            opacity: 0;
            transition: opacity 300ms ease;
        }
        .sidebar-overlay.show {
            display: block;
            opacity: 1;
        }

        /* 响应式布局 */
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: flex;
            }
            aside {
                transform: translateX(-100%);
                transition: transform 300ms ease;
                width: 280px !important;
                pointer-events: none; /* 隐藏时不接收点击事件 */
            }
            aside.show {
                transform: translateX(0);
                pointer-events: auto; /* 显示时恢复点击 */
            }
            main {
                margin-left: 0 !important;
                padding: 16px !important;
            }
            /* 内容区顶部留出菜单按钮空间 */
            #page-container {
                padding-top: 60px;
            }
        }

        /* 小屏幕进一步优化 */
        @media (max-width: 480px) {
            main {
                padding: 12px !important;
            }
        }

        /* 首页移动端适配 */
        @media (max-width: 768px) {
            /* 统计卡片网格 - 改为 2 列 */
            .stats-grid {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 12px !important;
            }
            .stats-grid > div {
                padding: 16px !important;
            }
            .stats-grid > div > div:first-child {
                width: 44px !important;
                height: 44px !important;
                font-size: 22px !important;
            }
            .stats-grid > div > div:last-child > p:last-child {
                font-size: 22px !important;
            }

            /* 快速开始卡片 */
            .quick-start-card {
                padding: 20px !important;
            }
            .quick-start-header {
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 16px !important;
            }
            .quick-start-header button {
                width: 100% !important;
                justify-content: center !important;
            }

            /* 快捷入口网格 - 改为 3 列但缩小 */
            .quick-grid {
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 8px !important;
            }
            .quick-grid button {
                padding: 12px 8px !important;
            }
            .quick-grid button span:first-child {
                font-size: 22px !important;
            }
            .quick-grid button span:nth-child(2) {
                font-size: 12px !important;
            }

            /* 徽章网格 - 改为 2 列 */
            .badges-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            /* 雷达图缩放 */
            .radar-chart svg {
                max-width: 240px !important;
                height: auto !important;
            }

            /* 复习提醒卡片 */
            .review-alert {
                flex-direction: column !important;
                text-align: center !important;
            }
            .review-alert > div:first-child {
                flex-direction: column !important;
                gap: 8px !important;
            }
        }

        @media (max-width: 480px) {
            /* 统计卡片在更小的屏幕上改为 2 列但更小 */
            .stats-grid {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 8px !important;
            }
            .stats-grid > div {
                padding: 12px !important;
                gap: 10px !important;
            }
            .stats-grid > div > div:first-child {
                width: 36px !important;
                height: 36px !important;
                font-size: 18px !important;
                border-radius: 10px !important;
            }
            .stats-grid > div > div:last-child > p:first-child {
                font-size: 11px !important;
            }
            .stats-grid > div > div:last-child > p:last-child {
                font-size: 18px !important;
            }

            /* 快捷入口在更小的屏幕上改为 2 列 */
            .quick-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            /* 徽章网格在更小的屏幕上保持 2 列 */
            .badges-grid {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 8px !important;
            }

            /* 雷达图进一步缩放 */
            .radar-chart svg {
                max-width: 200px !important;
            }
        }

        /* 智能练习设置页移动端适配 */
        @media (max-width: 768px) {
            /* 设置页容器 */
            .practice-settings-content {
                padding: 4px !important;
            }

            /* 主网格从 2 列改为 1 列，减小间距 */
            .practice-settings-grid {
                grid-template-columns: 1fr !important;
                gap: 8px !important;
                margin-bottom: 12px !important;
            }

            /* 设置页卡片内边距减小 */
            .practice-settings-card {
                padding: 12px !important;
            }

            /* 设置项标题减小 */
            .practice-settings-grid label {
                font-size: 13px !important;
                margin-bottom: 6px !important;
            }

            /* 难度选择改为 3 列，压缩按钮 */
            .diff-grid {
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 6px !important;
            }

            /* 运算类型保持 2 列 */
            .type-grid {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 6px !important;
            }

            /* 题目数量改为 4 列 */
            .count-grid {
                grid-template-columns: repeat(4, 1fr) !important;
                gap: 6px !important;
            }

            /* 答题模式 2 列 */
            .mode-grid {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 6px !important;
            }

            /* 设置页按钮压缩 */
            .mode-grid button,
            .diff-grid button,
            .type-grid button,
            .count-grid button {
                padding: 8px 4px !important;
                min-height: 44px !important;
                border-radius: 10px !important;
            }

            /* 按钮内文字减小 */
            .mode-grid button span:first-child,
            .diff-grid button span:first-child,
            .type-grid button span:first-child {
                font-size: 20px !important;
            }

            .mode-grid button span:nth-child(2),
            .diff-grid button span:nth-child(2),
            .type-grid button span:nth-child(2) {
                font-size: 12px !important;
            }

            /* 难度按钮描述 - 移动端显示简化版 */
            .diff-grid button {
                padding: 6px 2px 4px !important;
                min-height: 52px !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: center !important;
                gap: 1px !important;
            }

            .diff-grid button span:first-child {
                font-size: 18px !important;
                line-height: 1 !important;
            }

            .diff-grid button span:nth-child(2) {
                font-size: 11px !important;
                font-weight: 600 !important;
                line-height: 1.2 !important;
            }

            /* 描述文字 - 超小字号显示 */
            .diff-grid button span:last-child {
                display: block !important;
                font-size: 9px !important;
                color: #8E8E93 !important;
                line-height: 1.1 !important;
                margin-top: 1px !important;
                white-space: nowrap !important;
                transform: scale(0.9) !important;
            }

            .diff-grid button[style*="#007AFF"] span:last-child {
                color: rgba(0, 122, 255, 0.8) !important;
            }

            /* 题目数量按钮 */
            .count-grid button span:first-child {
                font-size: 18px !important;
            }

            /* 开始练习按钮区域 - 固定底部 */
            .practice-settings-content > div:last-child {
                position: fixed !important;
                bottom: 0 !important;
                left: 0 !important;
                right: 0 !important;
                background: white !important;
                padding: 12px 16px !important;
                box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1) !important;
                z-index: 50 !important;
                margin: 0 !important;
            }

            /* 开始按钮全宽 */
            .practice-start-btn {
                width: 100% !important;
            }

            /* 给底部留出空间 */
            .practice-settings-card {
                padding-bottom: 80px !important;
            }

            /* 提示文字调整 */
            .practice-settings-content > div:last-child p {
                margin: 4px 0 0 0 !important;
                font-size: 11px !important;
            }
        }

        @media (max-width: 480px) {
            /* 设置页卡片进一步减小 */
            .practice-settings-card {
                padding: 10px !important;
                padding-bottom: 80px !important;
            }

            /* 设置页标题字号减小 */
            .practice-settings-content h1 {
                font-size: 22px !important;
                margin-bottom: 4px !important;
            }

            /* 难度选择改为 3 列，更紧凑 */
            .diff-grid {
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 4px !important;
            }

            /* 题目数量保持 4 列但更小 */
            .count-grid {
                grid-template-columns: repeat(4, 1fr) !important;
                gap: 4px !important;
            }

            /* 按钮进一步压缩 */
            .mode-grid button,
            .diff-grid button,
            .type-grid button,
            .count-grid button {
                padding: 6px 2px !important;
                min-height: 40px !important;
                border-radius: 8px !important;
            }

            /* 按钮内图标更小 */
            .mode-grid button span:first-child,
            .diff-grid button span:first-child,
            .type-grid button span:first-child {
                font-size: 18px !important;
            }

            .mode-grid button span:nth-child(2),
            .diff-grid button span:nth-child(2),
            .type-grid button span:nth-child(2) {
                font-size: 11px !important;
            }

            .count-grid button span:first-child {
                font-size: 16px !important;
            }
        }
    </style>
</head>
<body style="background: #F5F5F7; min-height: 100vh; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;">
    <!-- 汉堡菜单按钮 (移动端显示) -->
    <button class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleSidebar()" aria-label="打开菜单">
        ☰
    </button>

    <!-- 遮罩层 -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- 应用容器 -->
    <div id="app" style="display: flex; min-height: 100vh;">
        <!-- 侧边栏导航 -->
        <aside id="sidebar" style="
            width: 220px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-right: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 20;
        ">
            <!-- Logo -->
            <div style="padding: 20px 16px; border-bottom: 1px solid rgba(0, 0, 0, 0.06);">
                <h1 style="font-size: 18px; font-weight: 700; color: #1C1C1E; display: flex; align-items: center; gap: 8px; margin: 0;">
                    <span style="
                        width: 32px;
                        height: 32px;
                        background: linear-gradient(135deg, #007AFF 0%, #0051D5 100%);
                        border-radius: 8px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        color: white;
                        font-size: 16px;
                    ">🧮</span>
                    <span>算术康复</span>
                </h1>
            </div>

            <!-- 导航菜单 -->
            <nav style="flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 6px;">
                <button onclick="router.navigate('home'); closeSidebar();" id="nav-home"
                    style="
                        width: 100%;
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        padding: 10px 14px;
                        border-radius: 10px;
                        font-size: 14px;
                        font-weight: 600;
                        border: none;
                        background: #007AFF;
                        color: white;
                        cursor: pointer;
                        transition: all 200ms ease;
                        box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
                    ">
                    <span style="font-size: 18px;">🏠</span>
                    <span>首页</span>
                </button>
                <button onclick="router.navigate('practice-settings'); closeSidebar();" id="nav-practice"
                    style="
                        width: 100%;
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        padding: 10px 14px;
                        border-radius: 10px;
                        font-size: 14px;
                        font-weight: 600;
                        border: none;
                        background: transparent;
                        color: #3C3C43;
                        cursor: pointer;
                        transition: all 200ms ease;
                    ">
                    <span style="font-size: 18px;">✏️</span>
                    <span>智能练习</span>
                </button>
                <button onclick="router.navigate('basic-training'); closeSidebar();" id="nav-basic"
                    style="
                        width: 100%;
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        padding: 10px 14px;
                        border-radius: 10px;
                        font-size: 14px;
                        font-weight: 600;
                        border: none;
                        background: transparent;
                        color: #3C3C43;
                        cursor: pointer;
                        transition: all 200ms ease;
                    ">
                    <span style="font-size: 18px;">📚</span>
                    <span>基础训练</span>
                </button>
                <button onclick="router.navigate('challenge'); closeSidebar();" id="nav-challenge"
                    style="
                        width: 100%;
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        padding: 10px 14px;
                        border-radius: 10px;
                        font-size: 14px;
                        font-weight: 600;
                        border: none;
                        background: transparent;
                        color: #3C3C43;
                        cursor: pointer;
                        transition: all 200ms ease;
                    ">
                    <span style="font-size: 18px;">🏆</span>
                    <span>挑战模式</span>
                </button>
                <button onclick="router.navigate('mistakes'); closeSidebar();" id="nav-mistakes"
                    style="
                        width: 100%;
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        padding: 10px 14px;
                        border-radius: 10px;
                        font-size: 14px;
                        font-weight: 600;
                        border: none;
                        background: transparent;
                        color: #3C3C43;
                        cursor: pointer;
                        transition: all 200ms ease;
                    ">
                    <span style="font-size: 18px;">📖</span>
                    <span>错题本</span>
                </button>
                <button onclick="router.navigate('history'); closeSidebar();" id="nav-history"
                    style="
                        width: 100%;
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        padding: 10px 14px;
                        border-radius: 10px;
                        font-size: 14px;
                        font-weight: 600;
                        border: none;
                        background: transparent;
                        color: #3C3C43;
                        cursor: pointer;
                        transition: all 200ms ease;
                    ">
                    <span style="font-size: 18px;">📊</span>
                    <span>历史记录</span>
                </button>
                <button onclick="router.navigate('settings'); closeSidebar();" id="nav-settings"
                    style="
                        width: 100%;
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        padding: 10px 14px;
                        border-radius: 10px;
                        font-size: 14px;
                        font-weight: 600;
                        border: none;
                        background: transparent;
                        color: #3C3C43;
                        cursor: pointer;
                        transition: all 200ms ease;
                    ">
                    <span style="font-size: 18px;">⚙️</span>
                    <span>设置</span>
                </button>

            </nav>

            <!-- 用户信息 -->
            <div style="padding: 12px; border-top: 1px solid rgba(0, 0, 0, 0.06);">
                <div style="
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    padding: 10px;
                    background: rgba(0, 0, 0, 0.04);
                    border-radius: 10px;
                ">
                    <div style="
                        width: 32px;
                        height: 32px;
                        background: linear-gradient(135deg, #5AC8FA 0%, #007AFF 100%);
                        border-radius: 50%;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        color: white;
                        font-weight: 700;
                        font-size: 12px;
                    ">用</div>
                    <div>
                        <p style="font-weight: 600; color: #1C1C1E; margin: 0; font-size: 13px;">默认用户</p>
                        <p style="color: #8E8E93; margin: 0; font-size: 11px;">坚持就是胜利</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main style="flex: 1; margin-left: 220px; padding: 24px 32px;">
            <!-- 页面容器 -->
            <div id="page-container" style="max-width: 1200px; margin: 0 auto;">
                <!-- 页面内容将通过 JS 动态加载 -->
            </div>
        </main>
    </div>

    <!-- JavaScript 模块 -->
    <script src="src/utils/storage.js"></script>
    <script src="src/utils/sound-manager.js"></script>
    <script src="src/utils/speech-manager.js"></script>
    <script src="src/utils/design-system.js"></script>
    <script src="src/utils/question-generator.js"></script>
    <script src="src/pages/home.js"></script>
    <script src="src/pages/practice-settings.js"></script>
    <script src="src/pages/practice-keypad.js"></script>
    <script src="src/pages/practice-choice.js"></script>
    <script src="src/pages/result.js"></script>
    <script src="src/pages/mistakes.js"></script>
    <script src="src/pages/history.js"></script>
    <script src="src/pages/settings.js"></script>
    <script src="src/pages/basic-training.js"></script>
    <script src="src/pages/challenge.js"></script>
    <script src="src/app.js"></script>

    <!-- 移动端侧边栏控制 -->
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('show');
            overlay.classList.toggle('show');
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.remove('show');
            overlay.classList.remove('show');
        }
    </script>
</body>
</html>
