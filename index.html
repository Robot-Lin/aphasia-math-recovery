<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算术康复练习</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        'primary-hover': '#2563EB',
                        success: '#10B981',
                        'success-light': '#D1FAE5',
                        error: '#EF4444',
                        'error-light': '#FEE2E2',
                        warning: '#F59E0B',
                    },
                    fontSize: {
                        'display': ['4rem', { lineHeight: '1.2' }],
                        'display-sm': ['3rem', { lineHeight: '1.2' }],
                        'question': ['3.5rem', { lineHeight: '1.3' }],
                    },
                    spacing: {
                        '18': '4.5rem',
                        '22': '5.5rem',
                    }
                }
            }
        }
    </script>
    <style>
        /* 自定义样式 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .btn-press:active {
            transform: scale(0.95);
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 大字体优化 */
        .large-text {
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-blue-100 min-h-screen">
    <!-- 应用容器 -->
    <div id="app" class="flex min-h-screen">
        <!-- 侧边栏导航 -->
        <aside class="w-64 bg-white/90 backdrop-blur-xl border-r border-gray-200 flex flex-col fixed h-full z-10">
            <!-- Logo -->
            <div class="p-6 border-b border-gray-100">
                <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <span class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white text-xl">🧮</span>
                    <span>算术康复</span>
                </h1>
            </div>

            <!-- 导航菜单 -->
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="router.navigate('home')" id="nav-home"
                    class="nav-item w-full flex items-center gap-3 px-4 py-4 rounded-xl text-lg font-medium transition-all duration-200 bg-primary text-white shadow-lg shadow-blue-200">
                    <span class="text-2xl">🏠</span>
                    <span>首页</span>
                </button>
                <button onclick="router.navigate('practice-settings')" id="nav-practice"
                    class="nav-item w-full flex items-center gap-3 px-4 py-4 rounded-xl text-lg font-medium text-gray-600 hover:bg-gray-100 transition-all duration-200">
                    <span class="text-2xl">✏️</span>
                    <span>开始练习</span>
                </button>
            </nav>

            <!-- 用户信息 -->
            <div class="p-4 border-t border-gray-100">
                <div class="flex items-center gap-3 px-4 py-3 bg-gray-50 rounded-xl">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-400 to-blue-600 rounded-full flex items-center justify-center text-white font-bold text-lg">
                        用
                    </div>
                    <div>
                        <p class="font-medium text-gray-800">默认用户</p>
                        <p class="text-sm text-gray-500">坚持就是胜利</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="flex-1 ml-64 p-8">
            <!-- 页面容器 -->
            <div id="page-container" class="max-w-4xl mx-auto">
                <!-- 页面内容将通过 JS 动态加载 -->
            </div>
        </main>
    </div>

    <!-- JavaScript 模块 -->
    <script src="src/utils/storage.js"></script>
    <script src="src/utils/sound-manager.js"></script>
    <script src="src/utils/question-generator.js"></script>
    <script src="src/pages/home.js"></script>
    <script src="src/pages/practice-settings.js"></script>
    <script src="src/pages/practice-keypad.js"></script>
    <script src="src/pages/result.js"></script>
    <script src="src/app.js"></script>
</body>
</html>
