<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算术康复练习</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        'primary-hover': '#2563EB',
                        success: '#10B981',
                        'success-light': '#D1FAE5',
                        error: '#EF4444',
                        'error-light': '#FEE2E2',
                        warning: '#F59E0B',
                    },
                    fontSize: {
                        'display': ['4rem', { lineHeight: '1.2' }],
                        'display-sm': ['3rem', { lineHeight: '1.2' }],
                        'question': ['3.5rem', { lineHeight: '1.3' }],
                    },
                    spacing: {
                        '18': '4.5rem',
                        '22': '5.5rem',
                    }
                }
            }
        }
    </script>
    <style>
        /* 自定义样式 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .btn-press:active {
            transform: scale(0.95);
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 大字体优化 */
        .large-text {
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body style="background: #F5F5F7; min-height: 100vh; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;">
    <!-- 应用容器 -->
    <div id="app" style="display: flex; min-height: 100vh;">
        <!-- 侧边栏导航 -->
        <aside style="
            width: 260px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-right: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 10;
        ">
            <!-- Logo -->
            <div style="padding: 24px; border-bottom: 1px solid rgba(0, 0, 0, 0.06);">
                <h1 style="font-size: 20px; font-weight: 700; color: #1C1C1E; display: flex; align-items: center; gap: 10px; margin: 0;">
                    <span style="
                        width: 36px;
                        height: 36px;
                        background: linear-gradient(135deg, #007AFF 0%, #0051D5 100%);
                        border-radius: 10px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        color: white;
                        font-size: 18px;
                    ">🧮</span>
                    <span>算术康复</span>
                </h1>
            </div>

            <!-- 导航菜单 -->
            <nav style="flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 8px;">
                <button onclick="router.navigate('home')" id="nav-home"
                    style="
                        width: 100%;
                        display: flex;
                        align-items: center;
                        gap: 12px;
                        padding: 12px 16px;
                        border-radius: 10px;
                        font-size: 15px;
                        font-weight: 600;
                        border: none;
                        background: #007AFF;
                        color: white;
                        cursor: pointer;
                        transition: all 200ms ease;
                        box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
                    ">
                    <span style="font-size: 20px;">🏠</span>
                    <span>首页</span>
                </button>
                <button onclick="router.navigate('practice-settings')" id="nav-practice"
                    style="
                        width: 100%;
                        display: flex;
                        align-items: center;
                        gap: 12px;
                        padding: 12px 16px;
                        border-radius: 10px;
                        font-size: 15px;
                        font-weight: 600;
                        border: none;
                        background: transparent;
                        color: #3C3C43;
                        cursor: pointer;
                        transition: all 200ms ease;
                    ">
                    <span style="font-size: 20px;">✏️</span>
                    <span>开始练习</span>
                </button>
            </nav>

            <!-- 用户信息 -->
            <div style="padding: 16px; border-top: 1px solid rgba(0, 0, 0, 0.06);">
                <div style="
                    display: flex;
                    align-items: center;
                    gap: 12px;
                    padding: 12px;
                    background: rgba(0, 0, 0, 0.04);
                    border-radius: 12px;
                ">
                    <div style="
                        width: 36px;
                        height: 36px;
                        background: linear-gradient(135deg, #5AC8FA 0%, #007AFF 100%);
                        border-radius: 50%;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        color: white;
                        font-weight: 700;
                        font-size: 14px;
                    ">用</div>
                    <div>
                        <p style="font-weight: 600; color: #1C1C1E; margin: 0; font-size: 14px;">默认用户</p>
                        <p style="color: #8E8E93; margin: 0; font-size: 12px;">坚持就是胜利</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main style="flex: 1; margin-left: 260px; padding: 40px;">
            <!-- 页面容器 -->
            <div id="page-container" style="max-width: 800px; margin: 0 auto;">
                <!-- 页面内容将通过 JS 动态加载 -->
            </div>
        </main>
    </div>

    <!-- JavaScript 模块 -->
    <script src="src/utils/storage.js"></script>
    <script src="src/utils/sound-manager.js"></script>
    <script src="src/utils/design-system.js"></script>
    <script src="src/utils/question-generator.js"></script>
    <script src="src/pages/home.js"></script>
    <script src="src/pages/practice-settings.js"></script>
    <script src="src/pages/practice-keypad.js"></script>
    <script src="src/pages/practice-choice.js"></script>
    <script src="src/pages/result.js"></script>
    <script src="src/app.js"></script>
</body>
</html>
